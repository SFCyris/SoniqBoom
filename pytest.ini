[pytest]
testpaths = tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    requires_ffmpeg: needs ffmpeg on PATH
    requires_uade123: needs uade123 (Amiga AHX / Hively renderer)
    requires_sidplayfp: needs sidplayfp
    requires_openmpt123: needs openmpt123
    requires_devices: needs real cast / DLNA / AirPlay hardware on the LAN
    slow: > 5 s per run; opt in with -m slow
    budget: first-byte budget gate; opt in with -m budget
addopts =
    -ra
    --strict-markers
    --tb=short
