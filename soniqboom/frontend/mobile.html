<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SoniqBoom">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="format-detection" content="telephone=no">
  <title>SoniqBoom</title>
  <link rel="manifest" href="/assets/manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="/assets/icons/apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/assets/icons/apple-touch-icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/assets/icons/apple-touch-icon-120.png">
  <link rel="stylesheet" href="/assets/css/mobile.css?v=2">
</head>
<body>
  <div id="m-app">

    <!-- ── Top bar (per-view title) ─────────────────────────────────────── -->
    <header id="m-topbar">
      <span id="m-topbar-title">Library</span>
      <!-- Escape hatch: the auto-redirect at / pins ``sb_ui=mobile`` so a
           phone that landed here once stays here.  This link lets the
           user opt back into the desktop UI (useful on iPads forced to
           mobile by a quirky UA, or for testing). -->
      <a id="m-desktop-link"
         href="/?ui=desktop"
         class="m-desktop-link"
         title="Switch to desktop site">
        Desktop site
      </a>
    </header>

    <!-- ── Main content area: the active view is rendered here ──────────── -->
    <main id="m-content">
      <section id="m-view-library"    class="m-view active"></section>
      <section id="m-view-search"     class="m-view"></section>
      <section id="m-view-queue"      class="m-view"></section>
      <section id="m-view-nowplaying" class="m-view"></section>
      <section id="m-view-settings"   class="m-view"></section>
    </main>

    <!-- ── Mini player (above tab bar) ──────────────────────────────────── -->
    <div id="m-miniplayer" class="m-miniplayer hidden" role="button" aria-label="Open Now Playing">
      <div id="m-mp-art" class="m-mp-art"><span class="m-mp-art-ph"></span></div>
      <div class="m-mp-meta">
        <div id="m-mp-title" class="m-mp-title">—</div>
        <div id="m-mp-artist" class="m-mp-artist"></div>
      </div>
      <button id="m-mp-play" class="m-mp-play" aria-label="Play/Pause">▶</button>
      <button id="m-mp-next" class="m-mp-next" aria-label="Next">⏭</button>
      <!-- UX-3 P0: mobile shell now has a cast affordance.  The button
           opens the same picker overlay the desktop shell uses (#btn-cast
           is a synonym so cast_picker.js wires both transparently).
           Hidden on viewports the picker doesn't fit gracefully (the
           bottom-sheet pattern handles ≤600 px). -->
      <button id="btn-cast" class="m-mp-cast" aria-label="Cast to device (Beta)" aria-haspopup="dialog" aria-expanded="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 16.1A5 5 0 0 1 5.9 20M2 12.05A9 9 0 0 1 9.95 20M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"/>
          <line x1="2" y1="20" x2="2.01" y2="20"/>
        </svg>
      </button>
      <div id="m-mp-progress" class="m-mp-progress"><div id="m-mp-progress-fill"></div></div>
    </div>

    <!-- Render/transcode feedback.  The shared player.js looks these up by id
         (converting-badge / buffering-badge), so without them the early
         "Rendering…" hint for SID/MIDI/tracker/AdLib/GME silently no-ops on
         mobile.  Sit them just above the mini-player as a small pill. -->
    <div id="converting-badge" class="m-badge converting-badge" hidden role="status" aria-live="polite">
      <span class="badge-label">Converting…</span>
      <button type="button" class="badge-cancel" id="converting-badge-cancel"
              aria-label="Cancel conversion" title="Cancel conversion" hidden>&times;</button>
    </div>
    <div id="buffering-badge" class="m-badge buffering-badge" hidden>Buffering…</div>

    <!-- Cast picker overlay — same markup the desktop shell exposes,
         so cast_picker.js can run unchanged on the mobile route.
         All ids match the picker's _ensureRefs lookups. -->
    <div id="cast-overlay" class="hidden" role="dialog"
         aria-labelledby="cast-title" aria-modal="true">
      <div id="cast-panel">
        <div class="cast-header">
          <h3 id="cast-title">Cast to device (Beta)</h3>
          <button id="cast-refresh" class="cast-icon-btn" aria-label="Refresh device list">&#8635;</button>
          <button id="cast-close" class="cast-icon-btn" aria-label="Close cast picker">&times;</button>
        </div>
        <div id="cast-active" class="cast-active hidden" aria-live="polite">
          <div class="cast-active-row">
            <div class="cast-active-info">
              <div class="cast-active-label">Casting to</div>
              <div class="cast-active-name" id="cast-active-name">—</div>
            </div>
            <button id="cast-stop" class="cast-stop-btn" aria-label="Stop casting">Stop casting</button>
          </div>
        </div>
        <div id="cast-loading" class="cast-state hidden" aria-live="polite">
          <div class="cast-spinner" aria-hidden="true"></div>
          <div class="cast-state-text">Searching for devices…</div>
        </div>
        <div id="cast-empty" class="cast-state hidden">
          <div class="cast-state-icon" aria-hidden="true">&#128268;</div>
          <div class="cast-state-text">No cast devices found.</div>
          <div class="cast-state-hint" id="cast-empty-hint">Devices must be on the same Wi-Fi.</div>
          <button type="button" id="cast-empty-retry" class="cast-error-btn">Search again</button>
        </div>
        <div id="cast-error" class="cast-state hidden">
          <div class="cast-state-icon" aria-hidden="true">&#9888;</div>
          <div class="cast-state-text" id="cast-error-text">Couldn't reach the cast service.</div>
          <div class="cast-state-hint" id="cast-error-hint"></div>
        </div>
        <ul id="cast-list" class="cast-list" role="list"></ul>
        <details id="cast-pref-disclosure" class="cast-pref">
          <summary>Audio quality</summary>
          <div class="cast-pref-options" role="radiogroup" aria-label="Audio quality preference">
            <label><input type="radio" name="cast-pref" value="auto" checked>
              <span>Auto</span><span class="cast-pref-hint">Lossless when supported</span></label>
            <label><input type="radio" name="cast-pref" value="force-mp3">
              <span>MP3 320</span><span class="cast-pref-hint">Works with most devices</span></label>
          </div>
        </details>
      </div>
    </div>

    <!-- ── Bottom tab bar ───────────────────────────────────────────────── -->
    <nav id="m-tabs" role="tablist">
      <button class="m-tab active" data-view="library"    aria-label="Library">
        <span class="m-tab-icon">🎵</span><span class="m-tab-label">Library</span>
      </button>
      <button class="m-tab" data-view="search"     aria-label="Search">
        <span class="m-tab-icon">🔍</span><span class="m-tab-label">Search</span>
      </button>
      <button class="m-tab" data-view="queue"      aria-label="Queue">
        <span class="m-tab-icon">≡</span><span class="m-tab-label">Queue</span>
      </button>
      <button class="m-tab" data-view="nowplaying" aria-label="Now Playing">
        <span class="m-tab-icon">♪</span><span class="m-tab-label">Now</span>
      </button>
      <button class="m-tab" data-view="settings"   aria-label="Settings">
        <span class="m-tab-icon">⚙</span><span class="m-tab-label">Settings</span>
      </button>
    </nav>

    <!-- ── Action sheet (long-press menu) ───────────────────────────────── -->
    <div id="m-sheet-backdrop" class="m-sheet-backdrop hidden"></div>
    <div id="m-sheet" class="m-sheet hidden" role="dialog" aria-modal="true">
      <div class="m-sheet-header" id="m-sheet-title">Actions</div>
      <ul id="m-sheet-actions" class="m-sheet-actions"></ul>
      <button id="m-sheet-cancel" class="m-sheet-cancel">Cancel</button>
    </div>

    <!-- ── Toast (transient feedback) ───────────────────────────────────── -->
    <div id="m-toast" class="m-toast hidden"></div>

  </div>

  <!-- The Player module grabs this element by id at module load. -->
  <!-- `crossorigin="anonymous"` is required on Safari: without it, the
       MediaElementSource output is treated as opaque and Web Audio's
       destination produces silence (the analyser still receives data,
       so visualizers keep twitching — but no sound hits the speakers). -->
  <audio id="audio-el" preload="none" crossorigin="anonymous" playsinline></audio>

  <script type="module" src="/assets/js/mobile/app.js?v=2"></script>
  <!-- Same cast picker the desktop shell loads.  Picker is a classic
       script that wires itself to #btn-cast on either route. -->
  <script src="/assets/js/cast_picker.js?v=2" defer></script>
</body>
</html>
